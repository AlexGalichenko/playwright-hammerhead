<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop - Login</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 0 20px; }
    input { display: block; width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    button { display: block; width: 100%; padding: 10px; background: #e02b27; color: white; border: none; cursor: pointer; }
    [data-test="error"] { background: #e2231a1a; border: 1px solid #e2231a; color: #e2231a; padding: 10px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Shop</h1>
  <input id="user-name" type="text" placeholder="Username" autocomplete="off">
  <input id="password" type="password" placeholder="Password">
  <button id="login-button">Login</button>
  <div data-test="error" id="error-msg" style="display:none"></div>

  <script>
    document.getElementById('login-button').addEventListener('click', function() {
      var user = document.getElementById('user-name').value;
      var pass = document.getElementById('password').value;
      var errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';

      if (!user) {
        errEl.textContent = 'Epic sadface: Username is required';
        errEl.style.display = 'block';
        return;
      }
      if (!pass) {
        errEl.textContent = 'Epic sadface: Password is required';
        errEl.style.display = 'block';
        return;
      }
      if (user === 'locked_out_user') {
        errEl.textContent = 'Epic sadface: Sorry, this user has been locked out.';
        errEl.style.display = 'block';
        return;
      }
      if (user === 'standard_user' && pass === 'secret_sauce') {
        localStorage.setItem('cart', '[]');
        window.location.href = 'http://localhost:8000/inventory.html';
        return;
      }
      errEl.textContent = 'Epic sadface: Username and password do not match any user in this service';
      errEl.style.display = 'block';
    });
  </script>
</body>
</html>
