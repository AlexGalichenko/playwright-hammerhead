<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop - Cart</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { color: #132322; }
    .cart_item { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .cart_item_name { font-weight: bold; }
    .cart_item_price { color: #1d252c; }
    .cart-buttons { display: flex; gap: 10px; margin-top: 20px; }
    button { padding: 10px 20px; cursor: pointer; border: 2px solid #3ddc91; background: white; font-weight: bold; }
    [data-test="checkout"] { background: #3ddc91; border-color: #3ddc91; }
    .empty-cart { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>Your Cart</h1>
  <div id="cart-items"></div>
  <div class="cart-buttons">
    <a href="http://localhost:8000/inventory.html"><button data-test="continue-shopping">Continue Shopping</button></a>
    <button data-test="checkout" id="checkout-btn">Checkout</button>
  </div>

  <script>
    var PRODUCTS = [
      { id: 4, slug: 'sauce-labs-backpack',               name: 'Sauce Labs Backpack',                  price: 29.99 },
      { id: 0, slug: 'sauce-labs-bike-light',             name: 'Sauce Labs Bike Light',                price:  9.99 },
      { id: 1, slug: 'sauce-labs-bolt-t-shirt',           name: 'Sauce Labs Bolt T-Shirt',              price: 15.99 },
      { id: 5, slug: 'sauce-labs-fleece-jacket',          name: 'Sauce Labs Fleece Jacket',             price: 49.99 },
      { id: 2, slug: 'sauce-labs-onesie',                 name: 'Sauce Labs Onesie',                    price:  7.99 },
      { id: 3, slug: 'test.allthethings()-t-shirt-(red)', name: 'Test.allTheThings() T-Shirt (Red)',    price: 15.99 },
    ];

    var cart = JSON.parse(localStorage.getItem('cart') || '[]');
    var container = document.getElementById('cart-items');

    if (cart.length === 0) {
      container.innerHTML = '<p class="empty-cart">Your cart is empty.</p>';
    } else {
      container.innerHTML = cart.map(function(slug, i) {
        var product = PRODUCTS.find(function(p) { return p.slug === slug; });
        if (!product) return '';
        return '<div class="cart_item" data-slug="' + slug + '">' +
          '<div>' +
            '<div class="cart_item_name" data-test="item-' + product.id + '-title-link">' + product.name + '</div>' +
            '<div class="cart_item_price">$' + product.price.toFixed(2) + '</div>' +
          '</div>' +
          '<div>Qty: 1</div>' +
          '</div>';
      }).join('');
    }

    document.getElementById('checkout-btn').addEventListener('click', function() {
      window.location.href = 'http://localhost:8000/checkout.html';
    });
  </script>
</body>
</html>
