<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop - Product Detail</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .inventory_details_name { font-size: 1.4em; font-weight: bold; margin: 10px 0; }
    button { padding: 10px 20px; cursor: pointer; }
    [data-test="back-to-products"] { background: white; border: 2px solid #3ddc91; margin-bottom: 20px; }
    [data-test="add-to-cart"] { background: white; border: 2px solid #3ddc91; }
  </style>
</head>
<body>
  <button data-test="back-to-products" onclick="history.back()">Back to Products</button>

  <div id="product-detail">
    <div class="inventory_details_name" id="product-name">Loading...</div>
    <div class="inventory_details_price" id="product-price"></div>
    <button data-test="add-to-cart" id="add-btn">Add to cart</button>
  </div>

  <script>
    var PRODUCTS = [
      { id: 4, slug: 'sauce-labs-backpack',               name: 'Sauce Labs Backpack',                  price: 29.99 },
      { id: 0, slug: 'sauce-labs-bike-light',             name: 'Sauce Labs Bike Light',                price:  9.99 },
      { id: 1, slug: 'sauce-labs-bolt-t-shirt',           name: 'Sauce Labs Bolt T-Shirt',              price: 15.99 },
      { id: 5, slug: 'sauce-labs-fleece-jacket',          name: 'Sauce Labs Fleece Jacket',             price: 49.99 },
      { id: 2, slug: 'sauce-labs-onesie',                 name: 'Sauce Labs Onesie',                    price:  7.99 },
      { id: 3, slug: 'test.allthethings()-t-shirt-(red)', name: 'Test.allTheThings() T-Shirt (Red)',    price: 15.99 },
    ];

    var params = new URLSearchParams(location.search);
    var id = parseInt(params.get('id') || '4', 10);
    var product = PRODUCTS.find(function(p) { return p.id === id; }) || PRODUCTS[0];

    document.getElementById('product-name').textContent = product.name;
    document.getElementById('product-price').textContent = '$' + product.price.toFixed(2);

    document.getElementById('add-btn').addEventListener('click', function() {
      var cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.indexOf(product.slug) === -1) {
        cart.push(product.slug);
        localStorage.setItem('cart', JSON.stringify(cart));
      }
      window.location.href = 'http://localhost:8000/inventory.html';
    });
  </script>
</body>
</html>
